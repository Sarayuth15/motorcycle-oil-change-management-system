spring.application.name=backend
spring.config.import=optional:file:.env[.properties]

# Server
server.port=8080

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/oil_tracker?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Email
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# App Config
app.service-interval-km=2500
app.from-email=${MAIL_USERNAME}

# CORS
app.cors.allowed-origins=${CORS_ORIGINS}

# Logging
logging.level.com.oiltracker=DEBUG
logging.level.org.springframework.mail=DEBUG
